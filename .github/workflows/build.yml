name: Build Mod

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Gradle
        run: chmod +x ./gradlew && ./gradlew build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: pkhud
          path: build/libs/*.jar
